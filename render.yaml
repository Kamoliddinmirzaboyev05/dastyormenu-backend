# Render Blueprint — deploy with: New + → Blueprint → pick this repo.
# Free tier: 1 web service + 1 Postgres. Redis is optional (in-memory channel
# layer is used when REDIS_URL is unset — fine for a single instance).
services:
  - type: web
    name: dastyormenu-backend
    runtime: docker
    plan: free
    healthCheckPath: /healthz/
    autoDeploy: true
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DEBUG
        value: "False"
      # SECRET_KEY auto-generated by Render (strong, persisted).
      - key: SECRET_KEY
        generateValue: true
      # DATABASE_URL wired from the managed Postgres below.
      - key: DATABASE_URL
        fromDatabase:
          name: dastyormenu-db
          property: connectionString
      # ---- Fill these in the Render dashboard (sync:false = not in blueprint) ----
      - key: ALLOWED_HOSTS
        sync: false          # e.g. dastyormenu-backend.onrender.com (auto-added too)
      - key: CORS_ALLOWED_ORIGINS
        sync: false          # e.g. https://admin.dastyor.uz,https://menu.dastyor.uz
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: FRONTEND_MENU_URL
        sync: false          # client app URL, used to build QR links
      - key: IMGBB_API_KEY
        sync: false          # https://api.imgbb.com
      - key: ADMIN_PASSWORD
        sync: false          # min 10 chars; creates the first superuser
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_EMAIL
        sync: false
      # Cross-site SPA <-> API cookie auth.
      - key: AUTH_COOKIE_SAMESITE
        value: None
      - key: AUTH_COOKIE_SECURE
        value: "True"
      # Optional: add a Render Redis instance and set REDIS_URL to scale WS/Celery.
      # - key: REDIS_URL
      #   fromService: { type: redis, name: dastyormenu-redis, property: connectionString }

databases:
  - name: dastyormenu-db
    plan: free
    databaseName: dastyor
    user: dastyor
